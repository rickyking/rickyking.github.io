# Hexo Configuration
## Docs: http://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Yi's Notes
subtitle: ⟨Data Scientist|Photographer⟩
description:
author: Yi Jin
email: y.jin@me.com
language:
  - default
  - zh-cn
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://jinyi.me
root: /
permalink: :year/:month/:title/


# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: ['portfolio/assets/**']

# Writing
new_post_name: :year-:month-:title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# admin page
#admin:
#  username: starrynight
#  password_hash: e72b22c00bcea583e3c9ac6abcc1d9fc
#  secret: secretyijin

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Archives
## 2: Enable pagination
## 1: Disable pagination
## 0: Fully Disable
archive: 1
category: 2
tag: 2

# Server
## Hexo uses Connect as a server
## You can customize the logger format as defined in
## http://www.senchalabs.org/connect/logger.html
port: 4000
server_ip: localhost
logger: false
logger_format: dev

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 5
pagination_dir: page


# Extensions
## Plugins: https://github.com/hexojs/hexo/wiki/Plugins
## Themes: https://github.com/hexojs/hexo/wiki/Themes
theme: next-reloaded
exclude_generator:

math:
  engine: 'katex'
  katex:
    css: #custom_css_source
    js: # not used
    config:
      # KaTeX config

# Deployment
## Docs: http://hexo.io/docs/deployment.html
deploy:
  type: git
  repo: git@github.com:rickyking/rickyking.github.io.git
  branch: master

# feed
feed:
  type: rss2
  path: rss2.xml
  limit: 0

index_generator:
  per_page: 10 ##首页默认10篇文章标题 如果值为0不分页

archive_generator:
    per_page: 10 ##归档页面默认10篇文章标题
    yearly: true  ##生成年视图
    monthly: true ##生成月视图

tag_generator:
    per_page: 10 ##标签分类页面默认10篇文章

sitemap:
    path: sitemap.xml
# NexT 主题相关配置 ==========================
since: 2013
avatar: ./images/avatar.jpg
google_site_verification: O-lITYmZBAkYSFBznsotea7jNhkjWVfNgKXjf3Vhi_0
google_analytics: UA-44808321-2

# Social links
icon_font: fifty-shades
